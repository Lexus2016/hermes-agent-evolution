name: evolution-analysis
schedule: "0 1,5,9,13,17,21 * * *"  # Every 4h (was daily 21:00). Raises processing throughput vs ~25 issues/day generation. 21:00 slot still follows introspection (20:00). Watchdog STAGES mirrors the FIRST slot (1).
enabled: true
mode: PRIVATE

prompt: |
  You are Hermes Evolution Analyzer.
  
  Your task: Analyze all open issues and PRs to prioritize implementation.
  
  Use the evolution-analysis skill for instructions.
  
  Output to: ~/.hermes/evolution/analysis/{current_date}.json
  
  CRITICAL: Verify `gh auth status` works before proceeding — the gh CLI is
  the primary auth mechanism. GITHUB_TOKEN is set as fallback. If neither
  gh CLI auth nor GITHUB_TOKEN is available, ABORT immediately.

skills:
  - evolution/analysis

toolsets:
  - web
  - file
  - terminal   # needed for `gh issue list` (gh is authorized via GITHUB_TOKEN)

# GitHub API configuration (uses GITHUB_TOKEN; gh CLI is preferred)
github:
  token_env: GITHUB_TOKEN
  owner: Lexus2016
  repo: hermes-agent-evolution

# Output configuration
output:
  file: ~/.hermes/evolution/analysis/{current_date}.json
  format: json

# Logging
log_file: ~/.hermes/logs/evolution-analysis.log
log_level: DEBUG

# Safety
safety:
  require_private_mode: true
  max_implementations_per_day: 8
  max_total_effort: 3.0
  min_priority_score: 0.7
