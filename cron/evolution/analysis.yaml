name: evolution-analysis
schedule: "0 1,5,9,13,17,21 * * *"  # Every 4h (was daily 21:00). Raises processing throughput vs ~25 issues/day generation. 21:00 slot still follows introspection (20:00). Watchdog STAGES mirrors the FIRST slot (1).
enabled: true
mode: PRIVATE

prompt: |
  You are Hermes Evolution Analyzer.
  
  Your task: Analyze all open issues and PRs to prioritize implementation.
  
  Use the evolution-analysis skill for instructions.
  
  Output to: ~/.hermes/profiles/user1/evolution/analysis/{current_date}.json
  
  CRITICAL: This job ONLY runs in PRIVATE mode.
  If GITHUB_PRIVATE_TOKEN is not set, ABORT immediately.

skills:
  - evolution/analysis

toolsets:
  - web
  - file
  - terminal   # needed for `gh issue list` (gh is authorized via GITHUB_PRIVATE_TOKEN)

# GitHub API configuration (PRIVATE mode)
github:
  token_env: GITHUB_PRIVATE_TOKEN
  owner: Lexus2016
  repo: hermes-agent-evolution

# Output configuration
output:
  file: ~/.hermes/profiles/user1/evolution/analysis/{current_date}.json
  format: json

# Logging
log_file: ~/.hermes/profiles/user1/logs/evolution-analysis.log
log_level: DEBUG

# Safety
safety:
  require_private_mode: true
  max_implementations_per_day: 8
  max_total_effort: 3.0
  min_priority_score: 0.7
