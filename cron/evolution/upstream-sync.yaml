name: evolution-upstream-sync
schedule: "0 8 * * 0"  # Weekly on Sunday at 8 AM
enabled: true
mode: PRIVATE

prompt: |
  You are Hermes Evolution Upstream Sync Manager.
  
  Your task: Sync with upstream Hermes Agent and integrate relevant changes.
  
  Use the evolution-upstream-sync skill for instructions.
  
  Output to: ~/.hermes/profiles/user1/evolution/upstream/{current_date}.md
  
  CRITICAL: This job ONLY runs in PRIVATE mode.
  If GITHUB_PRIVATE_TOKEN is not set, ABORT immediately.

skills:
  - evolution/upstream-sync

toolsets:
  - web
  - file
  - terminal

# GitHub configuration
github:
  upstream: https://github.com/nousresearch/hermes-agent.git
  origin: https://github.com/Lexus2016/hermes-agent-evolution.git
  token_env: GITHUB_PRIVATE_TOKEN

# Output configuration
output:
  file: ~/.hermes/profiles/user1/evolution/upstream/{current_date}.md
  format: markdown

# Logging
log_file: ~/.hermes/profiles/user1/logs/evolution-upstream-sync.log
log_level: DEBUG

# Safety
safety:
  require_private_mode: true
  test_after_merge: true
  auto_rollback_on_failure: true
  max_commits_per_sync: 10

# Sync strategy
strategy:
  security_fixes: auto_merge
  bug_fixes: auto_merge
  performance: manual_review
  new_features: manual_review
  breaking_changes: manual_review_required
